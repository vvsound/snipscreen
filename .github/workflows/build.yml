name: Build

on:
  push:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Build with g++
    run: g++ -O2 -o snip.exe snip.cpp -lgdi32 -luser32 -ldwmapi -lshcore

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: snip
        path: snip.exe
