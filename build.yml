name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.21'

    - name: Build
      run: go build -ldflags="-H windowsgui" -o snipscreen.exe .

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: snipscreen
        path: snipscreen.exe
