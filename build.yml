name: Build snip.exe

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: false

      - name: Get dependencies
        run: go mod tidy

      - name: Build
        run: go build -ldflags="-H windowsgui" -o snip.exe .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: snip
          path: snip.exe
